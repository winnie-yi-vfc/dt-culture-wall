<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VF DT — Our People (A/B Preview)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;900&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #1A1A1A;
            color: #fff;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ---- Top Bar ---- */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: #111;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
            z-index: 10;
        }
        .toolbar .title {
            font-size: 13px;
            font-weight: 600;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .toolbar .tabs {
            display: flex;
            gap: 4px;
        }
        .toolbar .tab {
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            background: transparent;
            color: #888;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .toolbar .tab:hover {
            color: #ccc;
            background: rgba(255,255,255,0.05);
        }
        .toolbar .tab.active {
            color: #fff;
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
        }

        /* ---- Preview Area ---- */
        .preview-area {
            flex: 1;
            display: flex;
            gap: 0;
            position: relative;
            overflow: hidden;
        }

        /* Single view */
        .preview-area.single .frame-wrap {
            flex: 1;
        }
        .preview-area.single .frame-wrap:not(.visible) {
            display: none;
        }

        /* Split view */
        .preview-area.split {
            gap: 2px;
        }
        .preview-area.split .frame-wrap {
            flex: 1;
        }

        .frame-wrap {
            position: relative;
            overflow: hidden;
            background: #000;
        }
        .frame-wrap iframe {
            width: 100%;
            height: 100%;
            border: none;
            transform-origin: top left;
        }

        /* Label badge */
        .frame-label {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 14px;
            border-radius: 4px;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .frame-label.a {
            background: #0D1B2A;
            color: #4A9EFF;
            border: 1px solid rgba(74,158,255,0.3);
        }
        .frame-label.b {
            background: #F7F6F2;
            color: #1A1A1A;
            border: 1px solid #E0DDD8;
        }

        /* Keyboard hint */
        .hint {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            z-index: 5;
            pointer-events: none;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <span class="title">02 // OUR PEOPLE — A/B Preview</span>
        <div class="tabs">
            <button class="tab" data-view="a" onclick="switchView('a')">Direction A · Dark</button>
            <button class="tab" data-view="b" onclick="switchView('b')">Direction B · Light</button>
            <button class="tab active" data-view="split" onclick="switchView('split')">Split Compare</button>
        </div>
    </div>

    <div class="preview-area split" id="preview-area">
        <div class="frame-wrap visible" id="wrap-a">
            <div class="frame-label a">DIRECTION A</div>
            <iframe id="frame-a" src="a.html"></iframe>
        </div>
        <div class="frame-wrap visible" id="wrap-b">
            <div class="frame-label b">DIRECTION B</div>
            <iframe id="frame-b" src="b.html"></iframe>
        </div>
    </div>
    <div class="hint">Press 1 / 2 / 3 to switch views</div>

    <script>
        const previewArea = document.getElementById('preview-area');
        const wrapA = document.getElementById('wrap-a');
        const wrapB = document.getElementById('wrap-b');
        const labelA = wrapA.querySelector('.frame-label');
        const labelB = wrapB.querySelector('.frame-label');

        function switchView(view) {
            // Update tabs
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[data-view="${view}"]`).classList.add('active');

            if (view === 'split') {
                previewArea.className = 'preview-area split';
                wrapA.classList.add('visible');
                wrapB.classList.add('visible');
                labelA.style.opacity = '1';
                labelB.style.opacity = '1';
            } else if (view === 'a') {
                previewArea.className = 'preview-area single';
                wrapA.classList.add('visible');
                wrapB.classList.remove('visible');
                labelA.style.opacity = '1';
                labelB.style.opacity = '0';
            } else {
                previewArea.className = 'preview-area single';
                wrapA.classList.remove('visible');
                wrapB.classList.add('visible');
                labelA.style.opacity = '0';
                labelB.style.opacity = '1';
            }
        }

        document.addEventListener('keydown', e => {
            if (e.key === '1') switchView('a');
            if (e.key === '2') switchView('b');
            if (e.key === '3') switchView('split');
        });
    </script>
</body>
</html>
