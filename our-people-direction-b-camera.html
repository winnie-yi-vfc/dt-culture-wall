<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VF DT APAC — Our People (Direction B · Interactive)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #F7F6F2;
            --text: #1A1A1A;
            --text-gray: #666;
            --text-muted: #999;
            --card-bg: #FFFFFF;
            --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
            --divider: #E0DDD8;
            --photo-bg: #E8E5E0;
            --team-a: #4A9EFF;
            --team-b: #FF6B9D;
            --team-c: #34D399;
            --team-d: #FFB547;
            --team-e: #A78BFA;
            --team-f: #F87171;
        }

        body {
            font-family: 'Inter', sans-serif;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            cursor: none;
        }

        /* ---- Stage ---- */
        .stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: var(--bg);
        }

        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 600ms ease-in-out;
            pointer-events: none;
        }
        .slide.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* ---- Shared Typography ---- */
        .section-label {
            font-size: 12px;
            font-weight: 500;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-variant-caps: all-small-caps;
        }

        .heading {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            color: var(--text);
        }

        .divider {
            height: 1px;
            background: var(--divider);
            border: none;
            margin: 0;
        }

        /* ======================================================
           SLIDE 1 — Overview (6 Team Grid · Interactive)
           ====================================================== */
        #slide-1 {
            display: flex;
            flex-direction: column;
            padding: 5vh 5vw 0;
        }

        .s1-header {
            flex: 0 0 auto;
            padding-top: 2vh;
        }
        .s1-header .section-label { margin-bottom: 8px; }
        .s1-header .heading {
            font-size: clamp(42px, 6vw, 72px);
            line-height: 1.05;
            margin-bottom: 10px;
            opacity: 0;
            transform: translateY(24px);
        }
        .s1-header .heading.visible {
            animation: slideUpFade 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
        }
        .s1-subhead {
            font-size: 17px;
            font-weight: 400;
            color: #777;
            opacity: 0;
            transform: translateY(12px);
            margin-bottom: 16px;
        }
        .s1-subhead.visible {
            animation: slideUpFade 0.7s 0.25s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        .s1-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 16px;
            padding: 2vh 0 3vh;
            align-content: center;
        }

        .s1-card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: scale(0.92);
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            border: 2px solid transparent;
        }
        .s1-card.visible {
            animation: cardPopIn 0.55s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
        }
        .s1-card.hovered {
            transform: scale(1.04);
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
            border-color: var(--team-accent);
            z-index: 10;
        }
        .s1-card.activating {
            transform: scale(1.06);
            box-shadow: 0 12px 40px rgba(0,0,0,0.25);
            border-color: var(--team-accent);
            z-index: 10;
        }

        @keyframes cardPopIn {
            to { opacity: 1; transform: scale(1); }
        }

        .s1-card-photo {
            flex: 1;
            background: var(--photo-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .s1-card-photo .camera-icon { font-size: 44px; opacity: 0.4; margin-bottom: 8px; }
        .s1-card-photo .photo-label { font-size: 13px; font-weight: 500; color: #aaa; }

        .s1-card-bottom {
            flex: 0 0 auto;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            position: relative;
        }
        .s1-card-bottom .team-name { font-size: 15px; font-weight: 700; }
        .s1-card-bottom .member-count { font-size: 12px; font-weight: 600; color: #999; }

        .s1-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background: var(--team-accent);
            border-radius: 12px 0 0 12px;
            z-index: 2;
        }

        /* Hover progress ring on card */
        .card-progress-ring {
            position: absolute;
            inset: -2px;
            border-radius: 12px;
            pointer-events: none;
            z-index: 3;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .card-progress-ring.active {
            opacity: 1;
        }
        .card-progress-ring svg {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
        }
        .card-progress-ring circle {
            fill: none;
            stroke: var(--team-accent);
            stroke-width: 3;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.1s linear;
        }

        /* ======================================================
           SLIDE 2 — Team Members Detail
           ====================================================== */
        #slide-2 {
            display: flex;
            flex-direction: column;
            padding: 4vh 4vw 3vh;
        }

        .s2-top-area {
            flex-shrink: 0;
            margin-bottom: 2vh;
        }
        .s2-top-area .section-label { margin-bottom: 6px; }
        .s2-top-row {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-top: 6px;
            margin-bottom: 14px;
        }
        .s2-top-row .heading {
            font-size: clamp(36px, 5.5vw, 64px);
            line-height: 1;
        }
        .s2-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
        }

        .s2-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 12px;
            align-content: center;
        }

        .s2-member {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            padding: 14px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
            transform: translateY(20px);
            position: relative;
            overflow: hidden;
        }
        .s2-member::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            border-radius: 12px 0 0 12px;
        }
        .s2-member.visible {
            animation: memberSlideUp 0.45s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
        }
        @keyframes memberSlideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .s2-avatar {
            width: 42px; height: 42px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .s2-info { min-width: 0; }
        .s2-info .name {
            font-size: 13px; font-weight: 600; color: var(--text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .s2-info .title {
            font-size: 11px; font-weight: 400; color: var(--text-gray);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-top: 2px;
        }

        .s2-badge-new {
            position: absolute;
            top: 8px; right: 8px;
            font-size: 9px; font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            border-radius: 4px;
            padding: 2px 7px;
        }

        /* Back button */
        .back-btn {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 100;
            background: var(--card-bg);
            border: 1px solid var(--divider);
            border-radius: 8px;
            padding: 10px 18px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            cursor: pointer;
            display: none;
            align-items: center;
            gap: 8px;
            box-shadow: var(--card-shadow);
            transition: background 0.2s;
            pointer-events: auto;
        }
        .back-btn:hover { background: #f0f0f0; }
        .back-btn.visible { display: flex; }
        .back-btn .back-icon { font-size: 16px; }

        /* Auto-back timer bar on slide 2 */
        .auto-back-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            z-index: 99;
            pointer-events: none;
        }
        .auto-back-bar.active {
            background: var(--team-accent, #4A9EFF);
            animation: backBarShrink 8s linear forwards;
        }
        @keyframes backBarShrink {
            from { width: 100%; }
            to { width: 0%; }
        }

        /* ======================================================
           CAMERA OVERLAY
           ====================================================== */
        .cam-overlay {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: flex-end;
            pointer-events: none;
        }
        .cam-preview {
            width: 200px;
            height: 130px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.6);
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            background: #1a1a1a;
            position: relative;
        }
        .cam-preview video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        .cam-preview canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }

        .cam-status {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 11px;
            font-weight: 600;
            color: #fff;
        }
        .cam-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #34D399;
            animation: pulse-dot 2s infinite;
        }
        .cam-dot.off { background: #F87171; animation: none; }
        .cam-dot.away { background: #FBBF24; animation: pulse-dot 3s infinite; }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ======================================================
           GUIDE OVERLAY — "Point at a team"
           ====================================================== */
        .guide-overlay {
            position: fixed;
            inset: 0;
            z-index: 9000;
            pointer-events: none;
            opacity: 1;
            transition: opacity 0.6s;
        }
        .guide-overlay.fading {
            opacity: 0;
        }

        .guide-pointer {
            position: absolute;
            width: 48px;
            height: 48px;
            pointer-events: none;
            animation: guideFloat 2.5s ease-in-out infinite;
        }
        @keyframes guideFloat {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(10px, -8px); }
            50% { transform: translate(-5px, -16px); }
            75% { transform: translate(-12px, -4px); }
        }

        .guide-text {
            position: absolute;
            bottom: 16%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.78);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 600;
            padding: 12px 28px;
            border-radius: 30px;
            white-space: nowrap;
            letter-spacing: 0.5px;
            animation: guideTextPulse 2.5s ease-in-out infinite;
        }
        @keyframes guideTextPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Finger cursor dot */
        .finger-cursor {
            position: fixed;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(52, 211, 153, 0.7);
            border: 2px solid rgba(52, 211, 153, 0.9);
            z-index: 9998;
            pointer-events: none;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 16px rgba(52, 211, 153, 0.5);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .finger-cursor.visible { opacity: 1; }
    </style>
</head>
<body>

    <!-- ============ FINGER CURSOR ============ -->
    <div class="finger-cursor" id="finger-cursor"></div>

    <!-- ============ GUIDE OVERLAY ============ -->
    <div class="guide-overlay" id="guide-overlay">
        <div class="guide-text">👆 Point your finger at a team to explore</div>
    </div>

    <!-- ============ BACK BUTTON ============ -->
    <button class="back-btn" id="back-btn">
        <span class="back-icon">←</span> Back to Teams
    </button>

    <!-- ============ CAMERA OVERLAY ============ -->
    <div class="cam-overlay" id="cam-overlay">
        <div class="cam-preview" id="cam-preview">
            <video id="cam-video" autoplay playsinline muted></video>
            <canvas id="cam-canvas"></canvas>
        </div>
        <div class="cam-status" id="cam-status">
            <div class="cam-dot" id="cam-dot"></div>
            <span id="cam-text">Camera loading...</span>
        </div>
    </div>

    <!-- ============ MAIN STAGE ============ -->
    <div class="stage">
        <!-- SLIDE 1 — Team Grid -->
        <div class="slide active" id="slide-1">
            <div class="s1-header">
                <div class="section-label">02 // OUR PEOPLE</div>
                <h1 class="heading" id="s1-heading">GREAT TOGETHER</h1>
                <p class="s1-subhead" id="s1-subhead">Point at a team to meet the members</p>
                <hr class="divider">
            </div>
            <div class="s1-grid" id="s1-grid"></div>
        </div>

        <!-- SLIDE 2 — Team Members Detail -->
        <div class="slide" id="slide-2">
            <div class="auto-back-bar" id="auto-back-bar"></div>
            <div class="s2-top-area">
                <div class="section-label">02 // OUR PEOPLE</div>
                <div class="s2-top-row">
                    <h1 class="heading" id="s2-team-name">TEAM A</h1>
                    <div class="s2-pill" id="s2-pill">20 Members</div>
                </div>
                <hr class="divider">
            </div>
            <div class="s2-grid" id="s2-grid"></div>
        </div>
    </div>

    <script type="module">
    import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18";
    // ============================================
    // TEAM DATA
    // ============================================
    const TEAMS = [
        { id: 'team-a', name: 'Team A', accent: '#4A9EFF', members: 20, short: 'A' },
        { id: 'team-b', name: 'Team B', accent: '#FF6B9D', members: 30, short: 'B' },
        { id: 'team-c', name: 'Team C', accent: '#34D399', members: 6,  short: 'C' },
        { id: 'team-d', name: 'Team D', accent: '#FFB547', members: 12, short: 'D' },
        { id: 'team-e', name: 'Team E', accent: '#A78BFA', members: 10, short: 'E' },
        { id: 'team-f', name: 'Team F', accent: '#F87171', members: 8,  short: 'F' },
    ];

    const MEMBER_FIRST_NAMES = [
        'Alex', 'Sam', 'Jordan', 'Chris', 'Taylor',
        'Morgan', 'Casey', 'Riley', 'Drew', 'Jamie',
        'Avery', 'Quinn', 'Blake', 'River', 'Skyler',
        'Harper', 'Indigo', 'Phoenix', 'Sage', 'Cedar',
        'Dakota', 'Emery', 'Finley', 'Gray', 'Hunter',
        'Iris', 'Jules', 'Kai', 'Lane', 'Marlow'
    ];
    const MEMBER_LAST_NAMES = [
        'Chen', 'Lee', 'Wu', 'Park', 'Kim',
        'Liu', 'Zhang', 'Huang', 'Wang', 'Xu',
        'Lin', 'Zhao', 'Ng', 'Sun', 'Ma',
        'Zhou', 'Chan', 'Lim', 'Tan', 'Tang',
        'Ho', 'Ko', 'Loh', 'Goh', 'Teo',
        'Chua', 'Kwan', 'Yap', 'Ong', 'Sim'
    ];
    const MEMBER_TITLES = [
        'Senior Engineer', 'Frontend Dev', 'Backend Dev', 'QA Lead', 'Tech Lead',
        'Product Manager', 'DevOps Engineer', 'Data Analyst', 'Scrum Master', 'UX Designer',
        'Engineering Manager', 'Full Stack Dev', 'Security Engineer', 'Data Scientist', 'Design Lead'
    ];

    function getInitials(first, last) { return (first[0] + last[0]).toUpperCase(); }
    function getMemberName(i) { return MEMBER_FIRST_NAMES[i] + ' ' + MEMBER_LAST_NAMES[i]; }
    function getMemberTitle(i) { return MEMBER_TITLES[i % MEMBER_TITLES.length]; }

    // ============================================
    // BUILD SLIDE 1 — Team Grid
    // ============================================
    function buildSlide1() {
        const grid = document.getElementById('s1-grid');
        grid.innerHTML = '';
        TEAMS.forEach((team, i) => {
            const card = document.createElement('div');
            card.className = 's1-card';
            card.dataset.teamIndex = i;
            card.dataset.delay = i;
            card.style.setProperty('--team-accent', team.accent);
            card.innerHTML = `
                <div class="card-progress-ring">
                    <svg viewBox="0 0 200 200">
                        <circle cx="100" cy="100" r="96"
                            stroke="${team.accent}" stroke-width="3" fill="none"
                            stroke-linecap="round"
                            stroke-dasharray="603.19"
                            stroke-dashoffset="603.19"
                            transform="rotate(-90 100 100)"
                            style="transition: stroke-dashoffset 0.1s linear;" />
                    </svg>
                </div>
                <div class="s1-card-photo">
                    <div class="camera-icon">📷</div>
                    <div class="photo-label">${team.name}</div>
                </div>
                <div class="s1-card-bottom">
                    <span class="team-name" style="color:${team.accent}">${team.name}</span>
                    <span class="member-count">${team.members} Members</span>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // ============================================
    // BUILD SLIDE 2 — Team Members
    // ============================================
    function buildSlide2(teamIndex) {
        const team = TEAMS[teamIndex];
        const grid = document.getElementById('s2-grid');
        const teamNameEl = document.getElementById('s2-team-name');
        const pillEl = document.getElementById('s2-pill');
        const autoBackBar = document.getElementById('auto-back-bar');

        document.getElementById('slide-2').style.setProperty('--team-accent', team.accent);

        teamNameEl.textContent = team.name.toUpperCase();
        pillEl.textContent = team.members + ' Members';
        pillEl.style.background = team.accent;

        // Build member cards
        grid.innerHTML = '';
        for (let i = 0; i < Math.min(team.members, 20); i++) {
            const card = document.createElement('div');
            card.className = 's2-member';
            card.dataset.delay = i;
            card.style.setProperty('--team-accent', team.accent);
            const fName = MEMBER_FIRST_NAMES[i];
            const lName = MEMBER_LAST_NAMES[i];
            const fullName = fName + ' ' + lName;
            const badgeHTML = i === 0 ? `<div class="s2-badge-new" style="background:${team.accent}">NEW</div>` : '';
            card.innerHTML = `
                <div class="s2-avatar" style="background:${team.accent}">${getInitials(fName, lName)}</div>
                <div class="s2-info">
                    <div class="name">${fullName}</div>
                    <div class="title">${getMemberTitle(i)}</div>
                </div>
                ${badgeHTML}
            `;
            card.style.setProperty('--team-accent', team.accent);
            card.querySelector('.s2-member')?.style?.setProperty?.('--team-accent', team.accent);
            // Fix: apply ::before color
            card.style.setProperty('--team-accent-before', team.accent);
            const styleTag = document.createElement('style');
            styleTag.textContent = `.s2-member[data-delay="${i}"]::before { background: ${team.accent} !important; }`;
            card.appendChild(styleTag);
            grid.appendChild(card);
        }

        // Animate members in
        requestAnimationFrame(() => {
            const members = grid.querySelectorAll('.s2-member');
            members.forEach(m => {
                const d = parseInt(m.dataset.delay) || 0;
                m.style.animationDelay = (0.2 + d * 0.05) + 's';
                m.classList.add('visible');
            });
        });

        // Auto-back bar
        autoBackBar.classList.remove('active');
        void autoBackBar.offsetWidth;
        autoBackBar.style.background = team.accent;
        autoBackBar.classList.add('active');
    }

    // ============================================
    // SLIDE NAVIGATION
    // ============================================
    const slide1 = document.getElementById('slide-1');
    const slide2 = document.getElementById('slide-2');
    const backBtn = document.getElementById('back-btn');
    const autoBackBar = document.getElementById('auto-back-bar');

    let currentSlide = 1;
    let currentTeamIndex = 0;
    let autoBackTimer = null;

    function goToSlide1() {
        currentSlide = 1;
        slide1.classList.add('active');
        slide2.classList.remove('active');
        backBtn.classList.remove('visible');
        autoBackBar.classList.remove('active');
        if (autoBackTimer) { clearTimeout(autoBackTimer); autoBackTimer = null; }
        // Show guide again
        const guide = document.getElementById('guide-overlay');
        guide.classList.remove('fading');
    }

    function goToSlide2(teamIndex) {
        currentTeamIndex = teamIndex;
        currentSlide = 2;
        buildSlide2(teamIndex);
        slide1.classList.remove('active');
        slide2.classList.add('active');
        backBtn.classList.add('visible');
        // Hide guide
        document.getElementById('guide-overlay').classList.add('fading');
        // Auto-back after 8 seconds
        if (autoBackTimer) clearTimeout(autoBackTimer);
        autoBackTimer = setTimeout(goToSlide1, 8000);
    }

    backBtn.addEventListener('click', goToSlide1);

    // ============================================
    // CAMERA + INTERACTION ENGINE
    // ============================================
    const video = document.getElementById('cam-video');
    const canvas = document.getElementById('cam-canvas');
    const ctx = canvas.getContext('2d');
    const camDot = document.getElementById('cam-dot');
    const camText = document.getElementById('cam-text');
    const fingerCursor = document.getElementById('finger-cursor');
    const guideOverlay = document.getElementById('guide-overlay');

    let handLandmarker = null;
    let camReady = false;
    let lastDetectionTime = 0;
    const DETECTION_INTERVAL = 100; // ms

    // Per-card hover tracking
    let cardHoverTimers = {}; // teamIndex -> { startTime, active }
    const HOVER_THRESHOLD = 1500; // 1.5s hover to activate

    function setStatus(state, text) {
        camDot.className = 'cam-dot';
        if (state === 'active') camText.textContent = text || 'Camera ready · Point at a team';
        else if (state === 'away') {
            camDot.classList.add('away');
            camText.textContent = text || 'No hand detected';
        } else {
            camDot.classList.add('off');
            camText.textContent = text || 'Camera off';
        }
    }

    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { width: 640, height: 480, facingMode: 'user' }
            });
            video.srcObject = stream;
            await video.play();

            canvas.width = 640;
            canvas.height = 480;

            setStatus('active', 'Camera ready · Loading AI...');
            camReady = true;

            await loadMediaPipeModel();
            requestAnimationFrame(detectionLoop);
        } catch (err) {
            console.warn('Camera access denied:', err.message);
            setStatus('off', 'Camera unavailable · Keyboard mode');
            camReady = false;
        }
    }

    async function loadMediaPipeModel() {
        const vision = await FilesetResolver.forVisionTasks(
            'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm'
        );

        handLandmarker = await HandLandmarker.createFromOptions(vision, {
            baseOptions: {
                modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
                delegate: 'GPU'
            },
            runningMode: 'VIDEO',
            numHands: 1,
            minHandDetectionConfidence: 0.5,
            minTrackingConfidence: 0.4
        });

        setStatus('active', 'AI ready · Point at a team!');
    }

    function getCardAtPoint(screenX, screenY) {
        const cards = document.querySelectorAll('#s1-grid .s1-card');
        for (const card of cards) {
            const rect = card.getBoundingClientRect();
            if (screenX >= rect.left && screenX <= rect.right &&
                screenY >= rect.top && screenY <= rect.bottom) {
                return card;
            }
        }
        return null;
    }

    function updateHoverProgress(card, elapsed) {
        const progressRing = card.querySelector('.card-progress-ring');
        if (!progressRing) return;
        const circle = progressRing.querySelector('circle');
        if (!circle) return;

        const progress = Math.min(elapsed / HOVER_THRESHOLD, 1.0);
        const circumference = 603.19;
        const offset = circumference * (1 - progress);
        circle.style.strokeDashoffset = offset;

        if (elapsed > 0) {
            progressRing.classList.add('active');
        } else {
            progressRing.classList.remove('active');
        }

        // Visual states
        card.classList.remove('hovered', 'activating');
        if (progress >= 1.0) {
            card.classList.add('activating');
        } else if (elapsed > 200) {
            card.classList.add('hovered');
        }
    }

    function resetAllHoverStates() {
        document.querySelectorAll('#s1-grid .s1-card').forEach(card => {
            card.classList.remove('hovered', 'activating');
            const ring = card.querySelector('.card-progress-ring');
            if (ring) {
                ring.classList.remove('active');
                const circle = ring.querySelector('circle');
                if (circle) circle.style.strokeDashoffset = '603.19';
            }
        });
    }

    async function detectionLoop(timestamp) {
        if (!camReady || !handLandmarker) {
            requestAnimationFrame(detectionLoop);
            return;
        }

        if (timestamp - lastDetectionTime < DETECTION_INTERVAL) {
            requestAnimationFrame(detectionLoop);
            return;
        }
        lastDetectionTime = timestamp;

        if (video.readyState < 2) {
            requestAnimationFrame(detectionLoop);
            return;
        }

        try {
            // Draw mirrored preview
            ctx.save();
            ctx.scale(-1, 1);
            ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
            ctx.restore();

            const now = performance.now();

            if (currentSlide === 1) {
                // Only track hand on slide 1
                const handResult = handLandmarker.detectForVideo(video, now);
                const hasHand = handResult.landmarks.length > 0;

                if (hasHand) {
                    setStatus('active', 'Hand detected · Point at a team');
                    const indexFingerTip = handResult.landmarks[0][8]; // index finger tip

                    // Mirror the x coordinate (camera is mirrored)
                    const mirroredX = 1 - indexFingerTip.x;
                    const screenX = mirroredX * window.innerWidth;
                    const screenY = indexFingerTip.y * window.innerHeight;

                    // Show finger cursor
                    fingerCursor.style.left = screenX + 'px';
                    fingerCursor.style.top = screenY + 'px';
                    fingerCursor.classList.add('visible');

                    // Draw hand landmarks on preview
                    handResult.landmarks[0].forEach(lm => {
                        const mx = canvas.width - lm.x * canvas.width;
                        const my = lm.y * canvas.height;
                        ctx.fillStyle = '#34D399';
                        ctx.beginPath();
                        ctx.arc(mx, my, 3, 0, Math.PI * 2);
                        ctx.fill();
                    });

                    // Highlight index fingertip
                    const tipMx = canvas.width - indexFingerTip.x * canvas.width;
                    const tipMy = indexFingerTip.y * canvas.height;
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(tipMx, tipMy, 8, 0, Math.PI * 2);
                    ctx.stroke();

                    // Check which card the finger is over
                    const hoveredCard = getCardAtPoint(screenX, screenY);

                    // Update hover timers
                    const nowMs = Date.now();
                    for (let i = 0; i < TEAMS.length; i++) {
                        const card = document.querySelector(`#s1-grid .s1-card[data-team-index="${i}"]`);
                        if (!card) continue;

                        if (card === hoveredCard) {
                            if (!cardHoverTimers[i]) {
                                cardHoverTimers[i] = { startTime: nowMs };
                            }
                            const elapsed = nowMs - cardHoverTimers[i].startTime;
                            updateHoverProgress(card, elapsed);

                            // Trigger activation
                            if (elapsed >= HOVER_THRESHOLD) {
                                delete cardHoverTimers[i];
                                resetAllHoverStates();
                                fingerCursor.classList.remove('visible');
                                goToSlide2(i);
                                return; // Skip rest of this frame
                            }
                        } else {
                            delete cardHoverTimers[i];
                            updateHoverProgress(card, 0);
                        }
                    }
                } else {
                    // No hand detected
                    fingerCursor.classList.remove('visible');
                    setStatus('active', 'No hand · Show your hand to explore');
                    resetAllHoverStates();
                    cardHoverTimers = {};
                }
            } else {
                // On slide 2, just show camera preview
                fingerCursor.classList.remove('visible');
                setStatus('active', 'Watching team members...');
            }

        } catch (e) {
            // Silently continue
        }

        requestAnimationFrame(detectionLoop);
    }

    // ============================================
    // KEYBOARD FALLBACK
    // ============================================
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && currentSlide === 2) {
            goToSlide1();
        } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
            if (currentSlide === 1) {
                // Cycle team selection with keyboard
                const cards = document.querySelectorAll('#s1-grid .s1-card');
                const current = document.querySelector('#s1-grid .s1-card.activating, #s1-grid .s1-card.hovered');
                let nextIdx = 0;
                if (current) {
                    const ci = parseInt(current.dataset.teamIndex);
                    nextIdx = (ci + 1) % TEAMS.length;
                }
                // Highlight and activate
                resetAllHoverStates();
                const nextCard = document.querySelector(`#s1-grid .s1-card[data-team-index="${nextIdx}"]`);
                if (nextCard) {
                    nextCard.classList.add('activating');
                    const ring = nextCard.querySelector('.card-progress-ring');
                    if (ring) {
                        ring.classList.add('active');
                        const circle = ring.querySelector('circle');
                        if (circle) circle.style.strokeDashoffset = '0';
                    }
                }
            }
        } else if (e.key === 'Enter' && currentSlide === 1) {
            const active = document.querySelector('#s1-grid .s1-card.activating, #s1-grid .s1-card.hovered');
            if (active) {
                const idx = parseInt(active.dataset.teamIndex);
                goToSlide2(idx);
            }
        } else if (e.key === '1' || e.key === '2' || e.key === '3' || e.key === '4' || e.key === '5' || e.key === '6') {
            if (currentSlide === 1) {
                const idx = parseInt(e.key) - 1;
                goToSlide2(idx);
            }
        }
    });

    // ============================================
    // INIT
    // ============================================
    buildSlide1();
    initCamera();

    // Animate slide 1 entrance
    requestAnimationFrame(() => {
        document.getElementById('s1-heading').classList.add('visible');
        document.getElementById('s1-subhead').classList.add('visible');
        document.querySelectorAll('#s1-grid .s1-card').forEach(card => {
            const d = parseInt(card.dataset.delay) || 0;
            card.style.animationDelay = (0.4 + d * 0.1) + 's';
            card.classList.add('visible');
        });
    });
    </script>
</body>
</html>
